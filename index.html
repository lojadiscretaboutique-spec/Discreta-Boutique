<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="google-site-verification" content="LX078OA3UVQbV7HA4vY8eIhf2sb2y3V8vbsn09QP0BQ" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <title>Discreta Boutique | Sensualidade e Elegância</title>
    <style>
      body { margin: 0; background: #000; font-family: system-ui, -apple-system, sans-serif; }
      #initial-splash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 10000;
        transition: opacity 0.5s ease;
      }
      .splash-logo {
        color: #fff; font-size: 4rem; font-weight: 900; font-style: italic;
        letter-spacing: -0.05em; text-transform: uppercase; margin-bottom: 2rem;
        opacity: 0; transform: scale(0.9);
        animation: splash-fade 0.8s forwards ease-out;
      }
      .splash-bar {
        width: 120px; height: 3px; background: #dc2626; border-radius: 99px;
        position: relative; overflow: hidden;
      }
      .splash-bar::after {
        content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
        background: rgba(255,255,255,0.4);
        animation: splash-loading 1.2s infinite ease-in-out;
      }
      .splash-tagline {
        color: #444; font-size: 10px; font-weight: 900; text-transform: uppercase;
        letter-spacing: 5px; margin-top: 1.5rem;
      }
      @keyframes splash-fade { to { opacity: 1; transform: scale(1); } }
      @keyframes splash-loading { 0% { left: -100%; } 50% { left: 0%; } 100% { left: 100%; } }
    </style>
  </head>
  <body>
    <div id="initial-splash">
      <div class="splash-logo">DISCRETA</div>
      <div class="splash-bar"></div>
      <div class="splash-tagline">Sedução & Sigilo</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
